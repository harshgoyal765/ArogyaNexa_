server:
  port: 8081

spring:
  application:
    name: ArogyaNexa-User-Management-Service

  datasource:
    url: jdbc:postgresql://localhost:5432/users_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:0000}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema — never use create/update in prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      #password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:www.sharma.117@gmail.com}
    password: ${MAIL_PASSWORD:xnos jkag tdmv vros}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# JWT configuration
jwt:
  secret: ${JWT_SECRET:fffb7e9a2329237a2f224f078a21b6d8117afb799bea9427697ac5c1ce56441d}
  access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}        # 15 minutes
  refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}   # 7 days

# Security settings
security:
  max-failed-attempts: 5
  lock-duration-minutes: 30
  password-expiry-days: 90
  password-reset-token-expiry-minutes: 15
  mfa-otp-expiry-minutes: 5

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always

# App info
app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    root: INFO
    in.arogyanexa: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/user-management-service.log
